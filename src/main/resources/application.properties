# Discord Configuration
# This value is expected to come from the DISCORD_BOT_TOKEN environment variable.
# The property is kept for documentation purposes and is not used directly.
discord.bot.token=

# PostgreSQL Configuration
# Defaults used when corresponding environment variables are not set.
db.url=jdbc:postgresql://localhost:5432/currency_bot
db.username=postgres
db.password=postgres

# HikariCP Connection Pool Configuration
# These values can be overridden via environment variables:
# DB_POOL_MAX_SIZE, DB_POOL_MIN_IDLE, DB_POOL_CONNECTION_TIMEOUT,
# DB_POOL_IDLE_TIMEOUT, DB_POOL_MAX_LIFETIME
db.pool.maximum-pool-size=10
db.pool.minimum-idle=2
db.pool.connection-timeout=30000
db.pool.idle-timeout=600000
db.pool.max-lifetime=1800000

# Prompts Configuration
# Directory path for external prompt markdown files (relative or absolute)
# These files are loaded on every AI request to provide system prompts
prompts.dir.path=./prompts

# Maximum size of a single prompt file in bytes (default: 1MB)
prompts.max-size=1MB
