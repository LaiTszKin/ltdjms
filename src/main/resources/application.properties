# Canonical packaged defaults for EnvironmentConfig.
# Runtime priority: system env > .env > application.properties > built-in defaults.

# Discord Configuration
# This value is intentionally blank and is expected to come from DISCORD_BOT_TOKEN.
discord.bot.token=

# PostgreSQL Configuration
# Canonical JDBC defaults used when DB_URL is not set.
db.url=jdbc:postgresql://localhost:5432/currency_bot
db.username=postgres
db.password=postgres

# Canonical component defaults used when DATABASE_* values are used to derive DB_URL
# or when DATABASE_USER / DATABASE_PASSWORD are provided without DB_USERNAME / DB_PASSWORD.
database.host=localhost
database.port=5432
database.name=currency_bot
database.username=postgres
database.password=postgres

# HikariCP Connection Pool Configuration
db.pool.maximum-pool-size=10
db.pool.minimum-idle=2
db.pool.connection-timeout=30000
db.pool.idle-timeout=600000
db.pool.max-lifetime=1800000

# Redis Configuration
redis.uri=redis://localhost:6379

# AI Service Configuration
ai.service.base-url=https://api.openai.com/v1
ai.service.api-key=
ai.service.model=gpt-3.5-turbo
ai.service.temperature=0.7
ai.service.timeout-seconds=30

# Prompts Configuration
prompts.dir.path=./prompts
prompts.max-size=1MB

# AI Response Configuration
ai.show-reasoning=false
ai.markdown-validation.enabled=true
ai.markdown-validation.streaming-bypass=false

# Public Application URL
app.public-base-url=

# ECPay Configuration
payment.ecpay.merchant-id=
payment.ecpay.hash-key=
payment.ecpay.hash-iv=
payment.ecpay.return-url=
payment.ecpay.stage-mode=true
payment.ecpay.cvs-expire-minutes=10080
payment.ecpay.callback.bind-host=127.0.0.1
payment.ecpay.callback.bind-port=8085
payment.ecpay.callback.path=/ecpay/callback
payment.ecpay.callback.shared-secret=

# Shop Fulfillment Configuration
shop.fulfillment.signing-secret=
