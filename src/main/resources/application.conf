# LTDJ management system Configuration
# Environment variables take precedence over these defaults

discord {
  # Bot token (required, override with DISCORD_BOT_TOKEN)
  bot-token = ${?DISCORD_BOT_TOKEN}
}

database {
  # PostgreSQL connection settings
  host = "localhost"
  host = ${?DATABASE_HOST}

  port = 5432
  port = ${?DATABASE_PORT}

  name = "discord_currency"
  name = ${?DATABASE_NAME}

  username = "postgres"
  username = ${?DATABASE_USER}

  password = ""
  password = ${?DATABASE_PASSWORD}

  # HikariCP connection pool settings
  pool {
    maximum-pool-size = 10
    maximum-pool-size = ${?DATABASE_POOL_MAX_SIZE}

    minimum-idle = 2
    minimum-idle = ${?DATABASE_POOL_MIN_IDLE}

    idle-timeout-ms = 600000
    connection-timeout-ms = 30000
  }
}
