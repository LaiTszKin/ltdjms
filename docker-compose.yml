services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      AI_SERVICE_MODEL: ${AI_SERVICE_MODEL}
      AI_SERVICE_TEMPERATURE: ${AI_SERVICE_TEMPERATURE}
      AI_SERVICE_TIMEOUT_SECONDS: ${AI_SERVICE_TIMEOUT_SECONDS}
      AI_SHOW_REASONING: ${AI_SHOW_REASONING}
      PROMPTS_DIR_PATH: /app/prompts
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE}
      DB_POOL_CONNECTION_TIMEOUT: ${DB_POOL_CONNECTION_TIMEOUT}
      DB_POOL_IDLE_TIMEOUT: ${DB_POOL_IDLE_TIMEOUT}
      DB_POOL_MAX_LIFETIME: ${DB_POOL_MAX_LIFETIME}
      LOG_DIR: /app/logs
      LOG_LEVEL: ${LOG_LEVEL:-WARN}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-20MB}
      LOG_MAX_HISTORY_DAYS: ${LOG_MAX_HISTORY_DAYS:-30}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-3GB}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-}
      ECPAY_RETURN_URL: ${ECPAY_RETURN_URL:-}
      ECPAY_STAGE_MODE: ${ECPAY_STAGE_MODE:-true}
      ECPAY_CALLBACK_PATH: ${ECPAY_CALLBACK_PATH:-/ecpay/callback}
      ECPAY_CALLBACK_BIND_HOST: 127.0.0.1
      ECPAY_CALLBACK_BIND_PORT: 8085
      REDIS_URI: redis://redis:6379
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+UseG1GC
    entrypoint: ["/bin/bash", "-c", "java $$JAVA_OPTS -jar app.jar"]
    volumes:
      - ./prompts:/app/prompts:ro
      - bot_logs:/app/logs
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - bot
    network_mode: "service:bot"
    environment:
      APP_PUBLIC_DOMAIN: ${APP_PUBLIC_DOMAIN:?APP_PUBLIC_DOMAIN is required for Caddy HTTPS ingress}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL is required for Caddy HTTPS ingress}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  bot_logs:
  caddy_data:
  caddy_config:
