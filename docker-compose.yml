services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: currency_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d currency_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      AI_SERVICE_MODEL: ${AI_SERVICE_MODEL}
      AI_SERVICE_TEMPERATURE: ${AI_SERVICE_TEMPERATURE}
      AI_SERVICE_TIMEOUT_SECONDS: ${AI_SERVICE_TIMEOUT_SECONDS}
      AI_SHOW_REASONING: ${AI_SHOW_REASONING}
      PROMPTS_DIR_PATH: /app/prompts
      DB_URL: jdbc:postgresql://postgres:5432/currency_bot
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_URI: redis://redis:6379
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+UseG1GC
    entrypoint: ["/bin/bash", "-c", "java $$JAVA_OPTS -jar app.jar"]
    volumes:
      - ./prompts:/app/prompts:ro
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
